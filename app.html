<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The MindfulAI Chat</title>
  <link rel="icon" href="static/favicon.png" type="image/png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  <script src="js/model.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color:#D1D5DB; border-radius:10px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased overflow-hidden">
  <div class="h-screen w-screen flex">
    <aside id="sidebar" class="w-72 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 transition-all duration-300 ease-in-out">
      <div class="flex-grow flex flex-col p-4 space-y-4 overflow-y-hidden">
        <button id="new-chat-btn" class="flex items-center w-full gap-3 p-3 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          <span class="font-semibold">New Chat</span>
        </button>
        <div class="pt-2">
          <h2 id="greeting" class="text-2xl font-bold">Welcome</h2>
          <p class="text-sm text-gray-500">Your private space.</p>
        </div>
        <div class="pt-4">
          <h3 class="text-xs font-semibold uppercase text-gray-500 tracking-wider">Current Mood</h3>
          <div id="mood-status" class="mt-2 p-2 rounded-md text-center font-semibold bg-gray-300 text-gray-800">Neutral</div>
        </div>
        <div class="flex-grow flex flex-col min-h-0 pt-4">
          <h3 class="text-xs font-semibold uppercase text-gray-500 tracking-wider mb-2">Recent Chats</h3>
          <div id="chats-container" class="flex-grow overflow-y-auto custom-scrollbar -mr-4 pr-4"></div>
        </div>
      </div>
      <div class="p-4 border-t border-gray-200">
        <a href="index.html" class="flex items-center w-full gap-3 p-3 rounded-lg bg-gray-100 text-gray-700 hover:bg-red-500 hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
          <span class="font-semibold">Back to Landing</span>
        </a>
      </div>
    </aside>
    <main id="main-content" class="w-full flex-grow flex flex-col h-screen bg-white">
      <header class="flex items-center p-4 border-b border-gray-200 flex-shrink-0">
        <button id="menu-toggle-btn" class="p-2 rounded-md text-gray-500 hover:bg-gray-100 mr-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
        </button>
        <h1 class="text-xl font-semibold">The MindfulAI</h1>
      </header>
      <div class="flex-grow flex flex-col relative overflow-hidden">
        <div id="start-screen" class="flex-grow flex flex-col items-center justify-center text-center p-4">
          <img src="static/favicon.png" alt="Logo" class="w-16 h-16 mb-4 rounded-full shadow-md" />
          <h2 class="text-2xl font-bold text-gray-600">How can I help you today?</h2>
        </div>
        <div id="chat-messages" class="p-6 flex flex-col gap-6 overflow-y-auto custom-scrollbar absolute inset-0 opacity-0"></div>
      </div>
      <div id="input-area" class="p-4 border-t border-gray-200 flex-shrink-0 bg-white">
        <div class="max-w-4xl mx-auto">
          <form id="message-form" class="flex items-center gap-4">
            <input id="message-input" type="text" placeholder="Type your thoughts here..." autocomplete="off" class="w-full bg-gray-100 p-4 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button type="submit" class="p-4 rounded-lg bg-blue-600 hover:bg-blue-500 transition-colors">
              <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>
<script>
(function(){
  const CFG = window.MINDFUL_CONFIG || {}; 
  const sidebar = document.getElementById('sidebar');
  const menuToggleBtn = document.getElementById('menu-toggle-btn');
  const messageForm = document.getElementById('message-form');
  const messageInput = document.getElementById('message-input');
  const startScreen = document.getElementById('start-screen');
  const chatMessages = document.getElementById('chat-messages');
  const chatsContainer = document.getElementById('chats-container');
  const moodStatus = document.getElementById('mood-status');
  const newChatBtn = document.getElementById('new-chat-btn');
  const greetingElement = document.getElementById('greeting');
  let chats = {}; let currentChatId = null;
  const userIconSVG = '<svg class="w-full h-full text-white p-1" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>';
  const saveState=()=>{localStorage.setItem('TheMindfulAI_chats',JSON.stringify(chats));localStorage.setItem('TheMindfulAI_currentChatId',currentChatId);};
  const loadState=()=>{const sc=localStorage.getItem('TheMindfulAI_chats');const cid=localStorage.getItem('TheMindfulAI_currentChatId');chats=sc?JSON.parse(sc):{};currentChatId=cid;};
  const renderSidebar=()=>{chatsContainer.innerHTML='';Object.keys(chats).sort((a,b)=>b-a).forEach(id=>{const chat=chats[id];const div=document.createElement('div');div.className=`p-3 rounded-lg cursor-pointer text-gray-700 hover:bg-gray-100 truncate ${id===currentChatId?'bg-blue-100':''}`;div.textContent=chat.title;div.dataset.chatId=id;chatsContainer.appendChild(div);});};
  chatsContainer.addEventListener('click',e=>{const d=e.target.closest('[data-chat-id]');if(d)loadChat(d.dataset.chatId);});
  const setViewState=s=>{if(s==='start'){startScreen.classList.remove('opacity-0','hidden');chatMessages.classList.add('opacity-0');}else{startScreen.classList.add('opacity-0','hidden');chatMessages.classList.remove('opacity-0');}};
  const loadChat=id=>{currentChatId=id;const chat=chats[id];chatMessages.innerHTML='';if(chat&&chat.messages.length>0){setViewState('chat');chat.messages.forEach(m=>addMessage(m.text,m.sender,false));}else{setViewState('start');}renderSidebar();saveState();};
  const createNewChat=()=>{const id=Date.now().toString();chats[id]={title:'New Chat',messages:[]};loadChat(id);if(window.innerWidth<1024)sidebar.classList.add('-ml-72');};
  newChatBtn.addEventListener('click',createNewChat);
  const addMessage=(text,sender,animate=true)=>{const isUser=sender==='user';const container=document.createElement('div');container.className=`flex items-start gap-4 ${isUser?'justify-end':''} ${animate?'opacity-0 transform translate-y-4':''} transition-all duration-300`;const avatar=`<div class="w-8 h-8 rounded-full flex-shrink-0 ${isUser?'bg-blue-600':'bg-transparent'}">${isUser?userIconSVG:'<img src="static/favicon.png" class="w-full h-full rounded-full" alt="AI" />'}</div>`;const bubble=`<div class="max-w-xl p-4 rounded-2xl ${isUser?'rounded-br-none bg-blue-600 text-white':'rounded-tl-none bg-gray-200 text-gray-800'}">${text}</div>`;container.innerHTML=isUser?bubble+avatar:avatar+bubble;chatMessages.appendChild(container);if(animate)setTimeout(()=>container.classList.remove('opacity-0','translate-y-4'),50);chatMessages.scrollTop=chatMessages.scrollHeight;};
  const setMood=m=>{const classes={positive:'bg-green-500 text-white',negative:'bg-blue-500 text-white',stress:'bg-yellow-400 text-yellow-900',default:'bg-gray-300 text-gray-800'};Object.values(classes).forEach(c=>moodStatus.classList.remove(...c.split(' ')));const cls=classes[m]||classes.default;moodStatus.classList.add(...cls.split(' '));moodStatus.textContent=m?m.charAt(0).toUpperCase()+m.slice(1):'Neutral';};
  messageForm.addEventListener('submit',async e=>{e.preventDefault();const userInput=messageInput.value.trim();if(!userInput||!currentChatId)return;if(chats[currentChatId].messages.length===0){setViewState('chat');chats[currentChatId].title=userInput.substring(0,30)+(userInput.length>30?'...':'');}
    addMessage(userInput,'user');chats[currentChatId].messages.push({sender:'user',text:userInput});messageInput.value='';renderSidebar();saveState();
    try{
      let data;
      if(CFG.MODE === 'local' && window.MindfulLocalModel){
        data = await window.MindfulLocalModel.predict(userInput, chats[currentChatId].messages);
      } else {
        throw new Error('Local model not initialized');
      }
      const aiText=data.response_text||"I'm not sure how to respond to that.";const mood=data.prediction||'default';
      addMessage(aiText,'ai');chats[currentChatId].messages.push({sender:'ai',text:aiText});setMood(mood);saveState();
    }catch(err){console.error(err);addMessage(err.message||'Issue generating a response.','ai');}
  });
  const init=()=>{const hr=new Date().getHours();greetingElement.textContent=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';if(window.innerWidth<1024)sidebar.classList.add('-ml-72');menuToggleBtn.addEventListener('click',()=>sidebar.classList.toggle('-ml-72'));loadState();if(currentChatId&&chats[currentChatId]){loadChat(currentChatId);}else{createNewChat();}setMood(null);};
  init();
})();
</script>
</body>
</html>
